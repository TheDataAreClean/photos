<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <circle cx="16" cy="16" r="16" fill="#1a1208"/>
  <!-- 6 aperture blades — alternating opacity for depth -->
  <path d="M16,16 L16,5 L25.5,10.5 Z"      fill="#c4a882" opacity="0.90"/>
  <path d="M16,16 L25.5,10.5 L25.5,21.5 Z" fill="#c4a882" opacity="0.60"/>
  <path d="M16,16 L25.5,21.5 L16,27 Z"     fill="#c4a882" opacity="0.90"/>
  <path d="M16,16 L16,27 L6.5,21.5 Z"      fill="#c4a882" opacity="0.60"/>
  <path d="M16,16 L6.5,21.5 L6.5,10.5 Z"   fill="#c4a882" opacity="0.90"/>
  <path d="M16,16 L6.5,10.5 L16,5 Z"       fill="#c4a882" opacity="0.60"/>
  <!-- Centre hole -->
  <circle cx="16" cy="16" r="4.5" fill="#1a1208"/>
